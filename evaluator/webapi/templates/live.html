{% extends "base.html" %}
{% block body %}
<div class="panel">
  <h2>Live query</h2>
  <p class="muted">Ad-hoc retrieval against the current pipeline. Build/validate a config on
    the Config page first; live retrieval uses the JSON API <code>POST /api/live/query</code>.</p>
  <form hx-post="/ui/live" hx-target="#live-results">
    <label class="field"><span>Query</span><textarea name="query_text" rows="2"></textarea></label>
    <label class="field"><span>k</span><input type="number" name="k" value="5"></label>
    <div class="row"><button type="submit">Search</button></div>
  </form>
  <div id="live-results"></div>
</div>
{% endblock %}
