{% set p = preset|default({}) %}
<form id="config-form">
  <details class="step" open>
    <summary>Preset</summary>
    <label class="field">
      <span>Start from preset</span>
      <select name="name"
              hx-get="/ui/preset" hx-target="#config-form-wrap" hx-include="#config-form" hx-trigger="change">
        <option value="">— none —</option>
        {% for name in options.presets %}
        <option value="{{ name }}">{{ name }}</option>
        {% endfor %}
      </select>
    </label>
  </details>

  <details class="step" open>
    <summary>Pipeline mode</summary>
    <label class="field" title="{{ options.field_help.get('pipeline_mode','') }}">
      <span>Mode</span>
      <select name="pipeline_mode"
              hx-get="/ui/models" hx-target="#model-fields" hx-include="#config-form" hx-trigger="change">
        {% for m in options.pipeline_modes %}
        <option value="{{ m }}" {{ 'selected' if m == mode else '' }}>{{ m }}</option>
        {% endfor %}
      </select>
    </label>
  </details>

  <details class="step" open>
    <summary>Models</summary>
    <div id="model-fields" class="grid">
      {% include "_models.html" %}
    </div>
  </details>

  <details class="step" open>
    <summary>Dataset</summary>
    <div class="grid">
      <label class="field">
        <span>Dataset</span>
        <select name="dataset_name">
          <option value="">— select —</option>
          {% for d in options.dataset_names %}
          <option value="{{ d }}" {{ 'selected' if d == p.get('dataset_name') else '' }}>{{ d }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field"><span>Questions path</span><input name="questions_path" value="{{ p.get('questions_path','') }}"></label>
      <label class="field"><span>Corpus path</span><input name="corpus_path" value="{{ p.get('corpus_path','') }}"></label>
      <label class="field" title="{{ options.field_help.get('batch_size','') }}"><span>Batch size</span><input type="number" name="batch_size" value="{{ p.get('batch_size', 8) }}"></label>
      <label class="field" title="{{ options.field_help.get('trace_limit','') }}"><span>Trace limit</span><input type="number" name="trace_limit" value="{{ p.get('trace_limit', 0) }}"></label>
    </div>
  </details>

  <details class="step">
    <summary>Retrieval &amp; output</summary>
    <div class="grid">
      <label class="field" title="{{ options.field_help.get('vector_db_type','') }}">
        <span>Vector DB</span>
        <select name="vector_db_type">
          {% for t in options.vector_db_types %}
          <option value="{{ t }}" {{ 'selected' if t == p.get('vector_db_type','inmemory') else '' }}>{{ t }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field" title="{{ options.field_help.get('retrieval_mode','') }}">
        <span>Retrieval mode</span>
        <select name="retrieval_mode">
          {% for r in options.retrieval_modes %}
          <option value="{{ r }}" {{ 'selected' if r == p.get('retrieval_mode','dense') else '' }}>{{ r }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field" title="{{ options.field_help.get('k','') }}"><span>k</span><input type="number" name="k" value="{{ p.get('k', 10) }}"></label>
      <label class="field"><span>Experiment name</span><input name="experiment_name" value="{{ p.get('experiment_name','webui_experiment') }}"></label>
      <label class="field"><span>Output dir</span><input name="output_dir" value="{{ p.get('output_dir','evaluation_results/webui') }}"></label>
    </div>
  </details>

  <details class="step">
    <summary>TTS audio synthesis</summary>
    <div class="grid">
      <label class="field"><span><input type="checkbox" name="audio_synthesis_enabled"
             {{ 'checked' if p.get('audio_synthesis_enabled') == 'on' else '' }}> Enable TTS</span></label>
      <label class="field">
        <span>TTS provider</span>
        <select name="tts_provider">
          {% for t in options.tts_providers %}
          <option value="{{ t }}" {{ 'selected' if t == p.get('tts_provider') else '' }}>{{ t }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="field"><span>TTS language</span><input name="tts_language" value="{{ p.get('tts_language','') }}"></label>
      <label class="field"><span>TTS voice</span><input name="tts_voice" value="{{ p.get('tts_voice','') }}"></label>
    </div>
  </details>

  <label class="field"><span><input type="checkbox" name="quick_test"> Quick test (cap to 20 samples)</span></label>
</form>

<div class="action-bar">
  <div class="row">
    <button hx-post="/ui/validate" hx-include="#config-form" hx-target="#output" class="secondary">Validate</button>
    <button hx-post="/ui/graph" hx-include="#config-form" hx-target="#output" class="secondary">Preview DAG</button>
    <button hx-post="/ui/yaml" hx-include="#config-form" hx-target="#output" class="secondary">View YAML</button>
    <button hx-post="/ui/run" hx-include="#config-form" hx-target="#output">Run experiment</button>
    <span class="htmx-indicator muted">working…</span>
  </div>
</div>
<div id="output"></div>
