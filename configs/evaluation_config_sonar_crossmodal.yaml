experiment:
  name: sonar_crossmodal_pubmed_qa
  output_dir: evaluation_results
dataset:
  id: pubmed_qa
  questions: examples/data/pubmed_qa_small/questions.json
  corpus: examples/data/pubmed_qa_small/corpus.json
  trace_limit: 5
  batch_size: 4
data:
  strict_validation: false
  num_workers: 0
graph:
  mode: audio_text_retrieval
nodes:
  asr:
    model: null
  audio_embedding:
    model: sonar_speech
    name: sonar_speech_encoder_eng
    dim: 1024
    device: cpu
  text_embedding:
    model: sonar
    name: text_sonar_basic_encoder
    params:
      source_lang: eng_Latn
    device: cpu
  vector_db:
    store: inmemory
  retrieval:
    k: 10
    gpu_id: 0
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    console_level: INFO
    file_level: DEBUG
audio_synthesis:
  enabled: true
  provider: mms
  language: en
  voice: en_US-lessac-medium
  sample_rate: 16000
  seed: 42
  output_dir: examples/data/pubmed_qa_small/audio
checkpoint_enabled: true
checkpoint_interval: 100
resume_from_checkpoint: true
