experiment:
  name: ablation_study_grid
vector_db:
  collection_name: ablation_study
  top_k: 10
nodes:
  corpus_index:
    store: chroma
  retrieval:
    mode: dense
runtime:
  logging:
    show_progress_bars: true
    log_timing: true
    console_level: INFO
dataset:
  name: pubmed_qa
  path: data/pubmed_qa
  max_samples: 500
ablation:
  retrieval_modes:
  - dense
  - sparse
  - hybrid
  hybrid_alphas:
  - 0.5
  - 0.7
  - 0.9
  fusion_methods:
  - weighted
  - rrf
  embedding_fusion:
    enabled:
    - false
    - true
    audio_weights:
    - 0.3
    - 0.5
    - 0.7
  query_optimization:
    enabled:
    - false
    - true
    methods:
    - rewrite
    - hyde
    iterations:
    - 1
    - 2
  query_expansion:
    enabled:
    - false
    - true
    methods:
    - synonym
    - prf
  reranking:
    enabled:
    - false
    - true
  diversity:
    enabled:
    - false
    - true
    lambda_params:
    - 0.5
    - 0.7
    - 0.9
evaluation:
  metrics:
  - mrr
  - ndcg
  - map
  - recall
  ndcg_k: 10
  recall_k:
  - 5
  - 10
  track_component_impact: true
output:
  results_dir: evaluation_results/ablation_study
  save_json: true
  save_csv: true
  generate_ablation_plots: true
  plot_types:
  - component_contribution
  - interaction_effects
  - pareto_frontier
query_optimization:
  enabled: false
  sample_rate: 0.1
judge:
  enabled: false
  sample_rate: 0.05
