experiment:
  name: hybrid_rrf_experiment
vector_db:
  collection_name: pubmed_hybrid
  fusion_method: rrf
  top_k: 10
  bm25_k1: 1.5
  bm25_b: 0.75
  bm25_epsilon: 0.25
nodes:
  corpus_index:
    store: chroma
  retrieval:
    mode: hybrid
    fusion:
      rrf_k: 60
runtime:
  logging:
    show_progress_bars: true
    console_level: INFO
dataset:
  name: pubmed_qa
  path: data/pubmed_qa
evaluation:
  metrics:
  - mrr
  - ndcg
  - map
  - recall
  - precision
  ndcg_k: 10
  recall_k:
  - 5
  - 10
  - 20
  precision_k: 10
output:
  results_dir: evaluation_results/hybrid_rrf
  save_json: true
  save_csv: true
  generate_plots: true
