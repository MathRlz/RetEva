# APM self-retrieval (audio_emb) — NODE-LIST DAG form (equivalent to apm_admed_m4t_abtt.yaml).
# The pipeline is written as an explicit graph.nodes list; each config-bearing node carries its
# config inline in `params` (folded into model/vector_db at load). The dataset stays in the
# `dataset:` block (the scalar single-source path — same as the map-form configs).
experiment:
  name: apm_admed_m4t_abtt_nodelist
  output_dir: evaluation_results
dataset:
  id: admed_voice
  path: null                # <- admed_voice dataset location (null = ADMED_VOICE_PATH / EVALUATOR_DATA_DIR env)
  split: test               # test = speaker-disjoint holdout (admed has no native split)
  batch_size: 32
data:
  num_workers: 4
  test_size: 0.3            # the test split = a 30% speaker-disjoint holdout
graph:
  mode: audio_emb_retrieval
  nodes:
    - dataset_source        # uses the dataset: block above
    - id: audio_embedding
      type: audio_embedding
      params:
        model: attention_pool_m4t   # SeamlessM4T-v2 encoder audio -> emb_dim, aligned to text
        size: v2-large
        dim: 2048                   # must match the text embedder's dim (jina_v4 = 2048)
        dropout: 0.1
        embedding_space: jina_v4_space   # APM trained to project audio into jina_v4's text space
        model_path: null            # <- trained attention-pool alignment weights (.pt)
        device: cuda:0
        params: {pooling: mean_abtt}
    - corpus_embedding      # text-embeds the corpus (cross-modal: audio query vs text corpus)
    - id: text_embedding
      type: text_embedding
      params:
        model: jina_v4
        name: jinaai/jina-embeddings-v4
        embedding_space: jina_v4_space   # same id as the audio embedder -> shared dense space
        device: cuda:1
    - id: vector_db
      type: vector_db
      params: {store: inmemory}
    - id: retrieval
      type: retrieval
      params: {k: 5}
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    cache_asr_features: false
    cache_transcriptions: false
    cache_embeddings: true
    cache_vector_db: true
  logging:
    console_level: INFO
    file_level: DEBUG
