# APM self-retrieval (audio_emb) — SeamlessM4T-v2 encoder, mean_whiten pooling, on admed (test split).
# Audio query embedded by the APM into the text-embedder space and matched against the
# transcription corpus (self-retrieval). Cross-modal alignment lives in the trained
# attention-pool weights — set audio_embedding.model_path (.pt) for meaningful numbers.
experiment:
  name: apm_admed_m4t_whiten
  output_dir: evaluation_results
dataset:
  id: admed_voice
  path: null                # <- admed_voice dataset location (null = ADMED_VOICE_PATH / EVALUATOR_DATA_DIR env)
  split: test               # test = speaker-disjoint holdout (admed has no native split)
  batch_size: 32
data:
  num_workers: 4
  test_size: 0.3            # the test split = a 30% speaker-disjoint holdout
graph:
  mode: audio_emb_retrieval
nodes:
  audio_embedding:
    model: attention_pool_m4t        # SeamlessM4T-v2 encoder audio -> emb_dim, aligned to the text space
    size: v2-large
    dim: 2048                  # must match the text embedder's dim (jina_v4 = 2048)
    dropout: 0.1
    params:
      pooling: mean_whiten      # attention | mean | mean_whiten | mean_abtt
    model_path: null           # <- trained attention-pool alignment weights (.pt)
    device: cuda:0
  text_embedding:
    model: jina_v4             # corpus side: embeds the transcription text (the "documents")
    name: jinaai/jina-embeddings-v4
    device: cuda:1
  vector_db:
    store: inmemory
  retrieval:
    k: 5
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    cache_asr_features: false
    cache_transcriptions: false
    cache_embeddings: true
    cache_vector_db: true
  logging:
    console_level: INFO
    file_level: DEBUG
