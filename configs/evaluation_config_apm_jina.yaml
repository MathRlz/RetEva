experiment:
  name: apm_jina_admed_voice_evaluation
  output_dir: evaluation_results
dataset:
  id: admed_voice
  batch_size: 32
data:
  num_workers: 4
  test_size: 0.0
graph:
  mode: audio_text_retrieval
model:
  audio_emb_adapter_path: null
nodes:
  asr:
    model: null
    name: null
    adapter: null
    device: cuda:0
  text_embedding:
    model: jina_v4
    name: jinaai/jina-embeddings-v4
    adapter: null
    device: cuda:1
  audio_embedding:
    model: attention_pool
    name: openai/whisper-large
    model_path: /home/student5/scripts/attention_pool_model/apm_jina_admed_voice.pt
    dim: 2048
    dropout: 0.1
    device: cuda:3
  vector_db:
    store: inmemory
  retrieval:
    k: 5
    gpu_id: 0
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    max_size_gb: null
    cache_asr_features: false
    cache_transcriptions: false
    cache_embeddings: true
    cache_vector_db: true
  logging:
    log_dir: logs
    console_level: INFO
    file_level: DEBUG
checkpoint_enabled: true
checkpoint_interval: 50
resume_from_checkpoint: true
