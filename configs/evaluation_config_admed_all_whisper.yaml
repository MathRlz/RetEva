experiment:
  name: medical_whisper_jina_v4
  output_dir: evaluation_results
dataset:
  id: admed_voice
  path: null                # admed_voice location; null = ADMED_VOICE_PATH / EVALUATOR_DATA_DIR env
  split: both               # train / test / both (admed has no validation split)
  batch_size: 32
data:
  num_workers: 4
  test_size: 0.0
graph:
  mode: asr_text_retrieval
model:
  audio_emb_adapter_path: null
nodes:
  asr:
    model: whisper
    name: openai/whisper-medium
    adapter: /home/student5/models/medical-transcribe-pl/natural_anonym_synth_cv_fl/
    device: cuda:0
  text_embedding:
    model: jina_v4
    name: jinaai/jina-embeddings-v4
    adapter: null
    device: cuda:1
  audio_embedding:
    model: null
    name: null
    device: cuda:0
  vector_db:
    store: inmemory
  retrieval:
    k: 5
    gpu_id: 0
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    max_size_gb: null
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    log_dir: logs
    console_level: INFO
    file_level: DEBUG
checkpoint_enabled: true
checkpoint_interval: 50
resume_from_checkpoint: true
