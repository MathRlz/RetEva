experiment:
  name: medical_best_practices
vector_db:
  diversity:
    enabled: true
    method: aspect
    aspects:
    - etiology
    - diagnosis
    - treatment
    - prognosis
    - prevention
    min_docs_per_aspect: 1
runtime:
  logging:
    show_progress_bars: true
    console_level: INFO
dataset:
  name: pubmed_qa
  path: data/pubmed_qa
query_optimization:
  enabled: true
  method: rewrite
  num_iterations: 1
  llm:
    provider: openai
    model: gpt-3.5-turbo
    api_key: ${OPENAI_API_KEY}
    temperature: 0.7
  rewrite_prompt: "You are a medical librarian. Rewrite this query using standard medical terminology\
    \ \n(prefer ICD-10, SNOMED CT, or UMLS terms when applicable).\n\nQuery: \"{query}\"\nContext: {context}\n\
    \nRewritten query with medical terminology:\n"
  cache_llm_calls: true
query_expansion:
  enabled: true
  method: synonym
  source: umls
  max_synonyms: 5
  synonym_weight: 0.3
  boost_original: 2.0
evaluation:
  metrics:
  - mrr
  - ndcg
  - map
  - recall
  ndcg_k: 10
  recall_k:
  - 5
  - 10
  - 20
output:
  results_dir: evaluation_results/medical_best_practices
  save_json: true
  generate_plots: true
