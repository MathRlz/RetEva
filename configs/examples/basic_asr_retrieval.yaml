experiment:
  name: basic_asr_retrieval
  output_dir: evaluation_results
dataset:
  id: admed_voice
  batch_size: 16
data:
  num_workers: 0
  test_size: 0.0
graph:
  mode: asr_text_retrieval
nodes:
  asr:
    model: whisper
    name: openai/whisper-medium
    adapter: null
    device: cuda:0
  text_embedding:
    model: labse
    name: sentence-transformers/LaBSE
    adapter: null
    device: cuda:0
  audio_embedding:
    model: null
    name: null
    device: cuda:0
  vector_db:
    store: inmemory
  retrieval:
    k: 5
    mode: dense
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    max_size_gb: null
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    log_dir: logs
    console_level: INFO
    file_level: DEBUG
checkpoint_enabled: true
checkpoint_interval: 50
resume_from_checkpoint: true
