experiment:
  name: fast_dev_test
  output_dir: evaluation_results
dataset:
  id: admed_voice
  batch_size: 4
data:
  num_workers: 0
  test_size: 0.0
graph:
  mode: asr_text_retrieval
nodes:
  asr:
    model: whisper
    name: openai/whisper-tiny
    adapter: null
    device: cpu
  text_embedding:
    model: labse
    name: sentence-transformers/LaBSE
    adapter: null
    device: cpu
  audio_embedding:
    model: null
    name: null
    device: cpu
  corpus_index:
    store: inmemory
  retrieval:
    k: 5
    mode: dense
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    max_size_gb: 5.0
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    log_dir: logs
    console_level: DEBUG
    file_level: DEBUG
checkpoint_enabled: true
checkpoint_interval: 10
resume_from_checkpoint: true
