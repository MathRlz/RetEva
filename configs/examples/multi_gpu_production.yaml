experiment:
  name: production_evaluation
  output_dir: evaluation_results
dataset:
  id: pubmed_qa
  questions: data/pubmed_qa/questions_with_audio.jsonl
  corpus: data/pubmed_qa/corpus_documents.jsonl
  trace_limit: 0
  batch_size: 64
data:
  strict_validation: true
  num_workers: 4
  test_size: 0.0
graph:
  mode: asr_text_retrieval
vector_db:
  bm25_k1: 1.5
  bm25_b: 0.75
nodes:
  asr:
    model: whisper
    name: openai/whisper-large-v3
    adapter: null
    device: cuda:0
  text_embedding:
    model: jina_v4
    name: jinaai/jina-embeddings-v4
    adapter: null
    device: cuda:1
  audio_embedding:
    model: null
    name: null
    device: cuda:0
  corpus_index:
    store: faiss_gpu
  retrieval:
    gpu_id: 0
    k: 10
    mode: hybrid
    fusion:
      method: rrf
      dense_weight: 0.5
      rrf_k: 60
    reranker:
      mode: cross_encoder
      enabled: true
      top_k: 50
      weight: 0.35
      model: cross-encoder/ms-marco-MiniLM-L-6-v2
      device: cuda:1
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    max_size_gb: null
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    log_dir: logs
    console_level: INFO
    file_level: DEBUG
checkpoint_enabled: true
checkpoint_interval: 200
resume_from_checkpoint: true
audio_synthesis:
  enabled: false
  provider: espeak
  voice: en
  sample_rate: 16000
  seed: 42
  output_dir: data/pubmed_qa/audio
