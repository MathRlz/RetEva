# Hani89 medical self-retrieval — v1: ASR + text embedding.
# "Fake" retrieval: the vector DB IS the set of text queries (hani_medical has no corpus, so
# AudioSamplesQueryDataset.get_corpus() derives one from the unique transcriptions; each audio
# query's relevant doc is its own transcription). Pipeline: audio -> ASR -> text embed ->
# search the transcription corpus. Whisper-medium, full GPU. Downloads the HF dataset.
experiment:
  name: hani_selfretr_asr_text
  output_dir: evaluation_results
dataset:
  id: hani_medical
  split: train              # train / test / both (HF splits; admed-style self-retrieval, no validation)
  batch_size: 32
  trace_limit: 300          # the HF train split is large; 0 = full
data:
  num_workers: 4
graph:
  mode: asr_text_retrieval
nodes:
  asr:
    model: whisper
    name: openai/whisper-medium
    device: cuda:0
  text_embedding:
    model: jina_v4
    name: jinaai/jina-embeddings-v4
    device: cuda:1
  vector_db:
    store: inmemory
  retrieval:
    k: 5
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    console_level: INFO
    file_level: DEBUG
