experiment:
  name: clap_style_admed_voice
  output_dir: evaluation_results
dataset:
  id: admed_voice
  batch_size: 32
data:
  num_workers: 4
  test_size: 0.0
graph:
  mode: audio_text_retrieval
nodes:
  asr:
    model: null
    name: null
    adapter: null
    device: cuda:1
  text_embedding:
    model: clap_text
    name: null
    adapter: null
    device: cuda:1
  audio_embedding:
    model: clap_style
    name: null
    model_path: ../clap_style_model/outputs/clap_fleurs_admed/best_model.pt
    device: cuda:1
    dim: 512
    dropout: 0.1
  corpus_index:
    store: inmemory
  retrieval:
    k: 10
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    max_size_gb: null
    cache_asr_features: false
    cache_transcriptions: false
    cache_embeddings: true
    cache_vector_db: true
  logging:
    log_dir: logs
    console_level: INFO
    file_level: DEBUG
checkpoint_enabled: true
checkpoint_interval: 50
resume_from_checkpoint: true
