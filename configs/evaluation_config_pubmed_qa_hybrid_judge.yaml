experiment:
  name: pubmed_qa_hybrid_judge
  output_dir: evaluation_results
dataset:
  id: pubmed_qa
  questions: data/pubmed_qa/questions_with_audio.jsonl
  corpus: data/pubmed_qa/corpus_documents.jsonl
  trace_limit: 50
  batch_size: 16
data:
  strict_validation: true
  num_workers: 0
graph:
  mode: asr_text_retrieval
vector_db:
  bm25_k1: 1.5
  bm25_b: 0.75
nodes:
  asr:
    model: whisper
    name: openai/whisper-medium
    device: cuda:0
  text_embedding:
    model: jina_v4
    name: jinaai/jina-embeddings-v4
    device: cuda:1
  corpus_index:
    store: inmemory
  retrieval:
    k: 10
    gpu_id: 0
    mode: hybrid
    fusion:
      dense_weight: 0.6
    reranker:
      mode: token_overlap
      top_k: 30
      weight: 0.35
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    console_level: INFO
    file_level: DEBUG
audio_synthesis:
  enabled: false
  provider: espeak
  voice: en
  sample_rate: 16000
  seed: 42
  output_dir: data/pubmed_qa/audio
judge:
  enabled: true
  api_base: https://api.openai.com/v1/chat/completions
  model: gpt-4o-mini
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_cases: 50
  timeout_s: 60
checkpoint_enabled: true
checkpoint_interval: 100
resume_from_checkpoint: true
