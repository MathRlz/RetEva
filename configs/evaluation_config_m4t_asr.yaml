experiment:
  name: m4t_asr_pubmed_qa_large
  output_dir: evaluation_results
dataset:
  id: pubmed_qa
  questions: examples/data/pubmedqa/questions.json
  corpus: examples/data/pubmedqa/corpus.json
  trace_limit: 5
  batch_size: 4
data:
  strict_validation: false
  num_workers: 0
graph:
  mode: asr_text_retrieval
nodes:
  asr:
    model: seamless_m4t
    name: facebook/seamless-m4t-v2-large
    params:
      tgt_lang: eng
    device: cpu
  text_embedding:
    model: labse
    device: cpu
  corpus_index:
    store: inmemory
  retrieval:
    k: 10
    gpu_id: 0
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    console_level: INFO
    file_level: DEBUG
audio_synthesis:
  enabled: true
  provider: mms
  language: en
  voice: en_US-lessac-medium
  sample_rate: 16000
  seed: 42
  output_dir: examples/data/pubmedqa/audio
checkpoint_enabled: true
checkpoint_interval: 100
resume_from_checkpoint: true
