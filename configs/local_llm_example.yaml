experiment:
  name: local_llm_evaluation
  output_dir: evaluation_results/local_llm
dataset:
  id: admed_voice
  batch_size: 32
data:
  num_workers: 4
  test_size: 0.0
graph:
  mode: asr_text_retrieval
model:
  audio_emb_adapter_path: null
nodes:
  asr:
    model: whisper
    name: openai/whisper-medium
    adapter: null
    device: cuda:0
  text_embedding:
    model: labse
    name: sentence-transformers/LaBSE
    adapter: null
    device: cuda:0
  audio_embedding:
    model: null
    name: null
    device: cuda:0
  vector_db:
    store: faiss
  retrieval:
    k: 5
    gpu_id: 0
runtime:
  cache:
    enabled: true
    cache_dir: .cache
    max_size_gb: null
    cache_asr_features: true
    cache_transcriptions: true
    cache_embeddings: true
    cache_vector_db: true
  logging:
    log_dir: logs
    console_level: INFO
    file_level: DEBUG
checkpoint_enabled: true
checkpoint_interval: 50
resume_from_checkpoint: true
llm_server:
  enabled: true
  backend: ollama
  host: localhost
  port: 11434
  model: mistral:7b-instruct
  auto_start: true
  gpu_layers: -1
  timeout_s: 60
query_optimization:
  enabled: true
  method: rewrite
  use_local_server: true
  local_server_url: http://localhost:11434/v1/chat/completions
  llm_model: mistral:7b-instruct
  llm_api_key_env: DUMMY_KEY
  llm_temperature: 0.3
  max_iterations: 2
judge:
  enabled: true
  use_local_server: true
  local_server_url: http://localhost:11434/v1/chat/completions
  model: mistral:7b-instruct
  api_key_env: DUMMY_KEY
  temperature: 0.0
  max_cases: 50
  judge_aspects:
  - relevance
  - accuracy
  - completeness
  score_aggregation: weighted
  aspect_weights:
    relevance: 0.5
    accuracy: 0.3
    completeness: 0.2
