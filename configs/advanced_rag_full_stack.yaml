experiment:
  name: advanced_rag_full_stack
vector_db:
  collection_name: medical_full_rag
  hybrid_alpha: 0.7
  fusion_method: weighted
  top_k: 10
  embedding_fusion:
    enabled: true
    method: weighted
    audio_weight: 0.6
    text_weight: 0.4
    normalize: true
  multi_vector:
    enabled: true
    strategy: chunk
    chunk_size: 512
    chunk_overlap: 50
    max_chunks_per_doc: 10
    aggregation: max
  use_reranking: true
  reranking_model: cross-encoder/ms-marco-MiniLM-L-12-v2
  reranking_top_k: 50
  final_top_k: 10
  diversity:
    enabled: true
    method: mmr
    lambda_param: 0.7
nodes:
  corpus_index:
    store: chroma
  retrieval:
    mode: hybrid
runtime:
  logging:
    show_progress_bars: true
    log_timing: true
    console_level: INFO
dataset:
  name: medical_audio
  path: data/medical_audio
  max_samples: 1000
query_optimization:
  enabled: true
  method: rewrite
  num_iterations: 2
  llm:
    provider: openai
    model: gpt-3.5-turbo
    api_key: ${OPENAI_API_KEY}
    temperature: 0.7
  cache_llm_calls: true
query_expansion:
  enabled: true
  method: prf
  num_feedback_docs: 3
  num_expansion_terms: 5
  feedback_weight: 0.4
judge:
  enabled: true
  provider: openai
  model: gpt-4
  api_key: ${OPENAI_API_KEY}
  temperature: 0.3
  aspects:
  - name: relevance
    weight: 0.4
    description: How relevant is this document to the query?
  - name: accuracy
    weight: 0.3
    description: Is the medical information accurate?
  - name: completeness
    weight: 0.2
    description: Does it fully address the query?
  - name: clarity
    weight: 0.1
    description: Is the information clearly presented?
  aggregation_method: weighted_average
  cache_results: true
  sample_rate: 0.1
evaluation:
  metrics:
  - mrr
  - ndcg
  - map
  - recall
  - precision
  track_per_sample: true
  save_predictions: true
output:
  results_dir: evaluation_results/advanced_rag_full
  save_json: true
  save_csv: true
  save_html: true
  generate_plots: true
