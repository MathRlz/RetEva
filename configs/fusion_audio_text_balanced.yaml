experiment:
  name: fusion_balanced_experiment
vector_db:
  collection_name: medical_fusion_balanced
  top_k: 10
  embedding_fusion:
    enabled: true
    method: weighted
    audio_weight: 0.5
    text_weight: 0.5
    normalize: true
    audio_model: wav2vec2-base
    text_model: sentence-transformers/all-MiniLM-L6-v2
nodes:
  corpus_index:
    store: chroma
  retrieval:
    mode: dense
runtime:
  logging:
    show_progress_bars: true
    console_level: INFO
dataset:
  name: medical_audio
  path: data/medical_audio
  loader: local
evaluation:
  metrics:
  - mrr
  - ndcg
  - map
  - recall
  ndcg_k: 10
  recall_k:
  - 5
  - 10
  - 20
output:
  results_dir: evaluation_results/fusion_balanced
  save_json: true
  save_csv: true
  generate_plots: true
